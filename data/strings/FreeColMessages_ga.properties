model.resource.ore.description=Osclaítear an talamh agus tá féith mhór méine ar fáil le haghaidh mianadóireachta. Ní fhaightear iad ach ar thalamh cnocach.
model.resource.silver.name=Airgead
model.resource.silver.description=Tá clú agus cáil ar an sliabh seo as féitheacha airgid a bheith air, agus cuirfidh sé rath ar bhailte in aice láimhe.
