model.lostCityRumour.burialGround.description=Tá tú tar éis reiligí naofa %nation% a thruailliú! Dá bhrí sin, ní mór duit bás a fháil!
model.lostCityRumour.cibola.description=Tá %city% aimsithe agat, ceann de na Seacht gCathracha Óir, agus tá seoda ar fiú %money% iad creachadh agat! Bog an traein taisce go ceann de do choilíneachtaí chun é a airgeadú, nó tabhair go dtí an Eoraip é i nGalleon.
model.lostCityRumour.colonist.description=Buaileann tú le marthanóirí coilíneachta caillte. Mar mhalairt ar bhia, mionnaíonn siad dílseacht don Choróin!
model.lostCityRumour.expeditionVanishes.description=D'imigh do thaisceálaithe gan tásc gan tuairisc!
model.lostCityRumour.fountainOfYouth.description=Tá Tobar na hÓige aimsithe agat. Tagann coilínigh Eorpacha chuig do dhugaí!
model.lostCityRumour.fountainOfYouth.noEurope.description=Tá Tobar na hÓige aimsithe agat.
