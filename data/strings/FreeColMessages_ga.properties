colopedia.concepts.education.name=Oideachas
colopedia.concepts.education.description=<html><p>Is é an bealach is éifeachtaí chun do choilínigh a oiliúint ná <a href="http:///id/model.building.schoolhouse">teach scoile</a> a thógáil agus aonad saineolaithe a shannadh mar mhúinteoir. Ansin, déanfaidh an múinteoir <a href="http:///id/model.unit.freeColonist">coilínigh shaor</a> a thiontú ina shaineolaí den chineál céanna. Is féidir le múinteoirí <a href="http:///id/model.unit.pettyCriminal">coirpigh bheaga</a> a uasghrádú go <a href="http:///id/model.unit.indenturedServant">seirbhísigh chonradh</a>, agus seirbhísigh chonradh ina gcoilínigh shaora.</p><p>Is féidir roinnt scileanna a fhoghlaim ó na bundúchasaigh freisin, trí choilínigh shaor nó seirbhíseach chonradh a sheoladh chun cónaí i lonnaíocht dhúchasach ar feadh seal. Agus is féidir roinnt scileanna a fhoghlaim trí thaithí freisin, trí choilínigh shaor a chur ag obair ar thíl choilíneachta. Bailíonn coilínigh saora atá ag obair sna páirceanna agus sna foraoisí timpeall ar do choilíneachtaí suas le 200 pointe taithí, rud a chiallaíonn go bhfuil seans ceithre faoin gcéad ann go n-uasghrádófar iad.</p></html>
colopedia.concepts.efficiency.name=Éifeachtúlacht
colopedia.concepts.efficiency.description=<html><p>Braitheann éifeachtúlacht do choilíneachtaí ar a dtacaíocht don choincheap neamhspleáchais. Má thacaíonn 50 faoin gcéad de na coilínigh le cúis na reibiliúnach, tugtar bónas táirgeachta +1 don choilíneacht. A luaithe a éiríonn 100 faoin gcéad de na coilínigh ina reibiliúnacha, méadaíonn an bónas táirgeachta go +2.</p><p>Ar an láimh eile, má sháraíonn líon na ríogaithe an teorainn <i>dona rialtais</i>, gearrtar pionós táirgeachta -1 ar an gcoilíneacht. Má sháraíonn líon na ríogaithe an teorainn <i>an-dona rialtais</i>, méadaítear an pionós táirgeachta go -2. Braitheann an dá theorainn seo ar an leibhéal deacrachta agus is féidir iad a sheiceáil sa <a href="http:///action/difficultyAction">tuarascáil leibhéal deacrachta</a>.</p><p>Chun éifeachtúlacht coilíneachta a mhéadú, ní mór duit a daonra a laghdú, nó níos mó <a href="http:///id/model.goods.bells">cloigíní saoirse</a> a tháirgeadh.</p></html>
colopedia.concepts.fortification.name=Daingniú
colopedia.concepts.fortification.description=<html><p>Is féidir le haonaid iad féin a <em>dhaingniú</em> ar thíl (trí thrinsí agus bacainní sealadacha a thógáil) chun a gcumas cosanta a mhéadú. Tógann sé casadh amháin chun daingniú iomlán a dhéanamh. Cuireann daingniú cosc ​​​​freisin ar aonaid a bheith faoi luíochán, agus ní mheastar a thuilleadh go bhfuil airtléire daingnithe "sa réimse oscailte" cé go ndéanfaidh ionsaí damáiste do na daingnithe. Ní sholáthraíonn daingniú bónas comhraic chosanta ach amháin in éagmais gnéithe cosanta fabhracha eile, mar sin níl aon bhónas ar fáil agus daingniú á dhéanamh ar shléibhte nó i gcoilíneacht le dún nó daingean.</p></html>
colopedia.concepts.independence.name=Neamhspleáchas
colopedia.concepts.independence.description=<html><p>Tosaíonn tú an cluiche mar thaiscéalaí le dornán aonad ar fáil duit. Tá an Monarc ag súil go mbunóidh tú coilíneacht sa Domhan Nua agus go dtabharfaidh tú seoda agus earraí coimhthíocha chuig do Chalafort Baile. Tá pleananna difriúla agat, áfach: ba mhaith leat náisiún neamhspleách a bhunú.</p><p>Chun neamhspleáchas a dhearbhú, ní mór duit 50% ar a laghad de dhaonra do choilíneachtaí a chur ina luí. Is féidir leat é seo a dhéanamh trí <a href="http:///id/model.goods.bells">cloigíní saoirse</a> a tháirgeadh, a mhéadaíonn <a href="http:///id/colopedia.concepts.efficiency">éifeachtúlacht</a> do choilíneachtaí freisin.</p><p>Mar is féidir leat a shamhlú, ní ligfidh an Monarc duit imeacht. Tar éis neamhspleáchas a dhearbhú, beidh ort troid i gcoinne <a href="http:///id/colopedia.concepts.ref">Fórsa Taiscéalaíochta Ríoga</a> (REF) agus é a scrios. Má rialaíonn an REF do choilíneachtaí cósta go léir riamh, nó 90% de do dhaonra ar a laghad, teipfidh ar d’iarracht ar neamhspleáchas.
colopedia.concepts.interventionForce.name=Fórsa Idirghabhála
colopedia.concepts.interventionForce.description=<html><p>Aon iarracht ó do choilíneachtaí neamhspleáchas a dhearbhú, lagóidh sé do thír dhúchais go dosheachanta. Tá sé seo chun leasa naimhde do thíre dhúchais. Ar an gcúis seo, cuirfidh duine acu Fórsa Idirghabhála chun tacú leat i gcoinne an Fhórsa Taiscéalaíochta Ríoga i gCogadh na Saoirse, ar choinníoll go mbeidh líon leordhóthanach <a href="http:///id/model.goods.bells">cloigíní saoirse</a> agat.</p><p>Le linn an chluiche, neartófar an Fórsa Idirghabhála agus an Fórsa Taiscéalaíochta Ríoga araon le haonaid bhreise.</p></html>
colopedia.concepts.ref.name=Fórsa Ríoga Taiscéalaíochta
colopedia.concepts.ref.description=<html><p>Tá a fhios ag an Monarc níos fearr ná muinín a bheith aige as drong conquistadóirí ragtag agus míshásta reiligiúnacha nach bhfuil sásta cánacha a íoc agus géilleadh d'éilimh chóir na Corónach. Ar an gcúis seo, coinníonn an Monarc Fórsa Ríoga Taiscéalaíochta (REF) speisialta réidh chun aon iarracht chun neamhspleáchas a dhearbhú agus scaradh ón tír dhúchais a chur faoi chois.</p><p>Tá an Fórsa Ríoga Taiscéalaíochta cothrom go páirteach ag an bhFórsa Idirghabhála, a chuirfidh cumhacht eachtrach atá báúil le do chúis amach, ar choinníoll gur féidir leat líon leordhóthanach cloigíní saoirse a tháirgeadh. Ó am go ham, cuirfear aonaid bhreise leis an <i>Royal Expeditionary Force</i> agus leis an <a href="http:///id/colopedia.concepts.interventionForce">Intervention Force</a> araon.</p></html>
colopedia.concepts.taxes.name=Cánacha
colopedia.concepts.taxes.description=<html><p>Go luath sa chluiche, ní ghearrann an Monarc aon chánacha ar d'ioncam. Le himeacht ama, áfach, cinnteoidh an Monarc go méadóidh sé cánacha díolacháin ar roinnt cúiseanna a d'fhéadfadh a bheith níos inchreidte duit. Gach uair a mholann an Monarc cánacha a mhéadú, féadfaidh tú diúltú. Sa chás sin, déanfar baghcat ar chineál áirithe earraí, rud a chiallaíonn nach mbeidh tú in ann an cineál sin earraí a cheannach ná a dhíol san Eoraip a thuilleadh, agus scriosfaidh coilínigh feargacha i gceann de do choilíneachtaí suas le céad earra den chineál sin earraí.</p><p>Is féidir baghcat a chur ar ceal trí d'iarmhéideanna cánach a íoc (gnó costasach), nó trí thoghadh <a href="http:///id/model.foundingFather.jacobFugger">Jacob Fugger</a> chuig an gComhdháil Ilchríochach.</p></html>
colopedia.foundingFather.description=Is grúpa ceannaithe, taiscéalaithe, saighdeoirí, státairí agus daoine den chléir cáiliúla iad na Bunaitheoirí, a bhronnann ábaltachtaí speisialta ort a luaithe a thoghtar ar Chomhdháil na Mór-Roinne iad . Chun Bunaitheoir a thoghadh, ní mór duit líon áirithe Cloigíní Saoirse a ghiniúint, líon a ardaítear tar éis gach toghcháin.\n\nBíonn gach Bunaitheoir ar fáil ar feadh ré iomlán an chluiche, cé go n-athraíonn an dóchúlacht go n-ainmneofar iad le himeacht ama. Tá gach Bunaitheoir ar fáil do gach náisiún Eorpach, fiú amháin más rud é gur thogh náisiún eile iad cheana féin.
