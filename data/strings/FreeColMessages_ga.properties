model.colony.lostGoodGovernment=Tá éifeachtúlacht an rialtais laghdaithe! Níl meon na reibiliúnach i %colony% cothrom le %number% faoin gcéad a thuilleadh, ná níl sé níos mó ná sin. Ní fhaigheann an choilíneacht aon bhónas táirgeachta a thuilleadh.
