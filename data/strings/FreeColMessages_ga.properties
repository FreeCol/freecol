model.building.armory.name=Armlann
model.building.armory.description=Úsáidtear an armlann chun muscaeid a dhéanamh as uirlisí. A luaithe agus a mbíonn daonra de 8 ann, is féidir an armlann a uasghrádú go harmlann mhór agus ansin go harmlann ollmhór, ar an gcoinníoll go ndeachaigh Adam Smith isteach i gComhdháil na Mór-Roinne.
model.building.arsenal.name=Armlann mhór
model.building.arsenal.description=Úsáidtear an armlann mhór chun muscaeid a dhéanamh as uirlisí.\n\nTar éis armlann mhór a thógáil níl gá ach le leath an líon uirlisí chun muscaed a tháirgeadh.
model.building.blacksmithHouse.name=Teach an ghabha
model.building.blacksmithHouse.description=Úsáidtear teach an ghabha, ar féidir é a uasghrádú go ceardlann ghabha, chun mianach a thiontú ina n-uirlisí. Tá uirlisí ag teastáil chun cineálacha áirithe foirgneamh a thógáil agus chun gach cineál foirgneamh a uasghrádú. Úsáideann ceannródaithe uirlisí freisin agus chun muscaeidí a tháirgeadh. Nuair a shroicheann daonra na coilíneachta 8, is féidir ceardlann iarainn a athsholáthar, ar choinníoll go bhfuil Adam Smith tar éis dul isteach sa Chomhdháil Ilchríochach.
model.building.blacksmithShop.name=Siopa an ghabha
model.building.blacksmithShop.description=Úsáidtear ceardlann an ghabha, ar féidir í a uasghrádú go dtí oibreacha iarainn, chun mianach a thiontú ina huirlisí. Tá uirlisí ag teastáil chun cineálacha áirithe foirgneamh a thógáil agus chun gach cineál foirgneamh a uasghrádú. Úsáideann ceannródaithe uirlisí freisin agus chun muscaeidí a tháirgeadh. Nuair a shroicheann daonra na coilíneachta 8, is féidir ceardlann an ghabha a athsholáthar le hoibreacha iarainn, ar choinníoll go bhfuil Adam Smith tar éis dul isteach sa Chomhdháil Ilchríochach. Méadaíonn ceardlann ghabha táirgeadh uirlisí.
model.building.carpenterHouse.name=Teach an tsiúinéara
model.building.carpenterHouse.description=Úsáidtear teach an siúinéara, ar féidir é a uasghrádú go muileann adhmaid a luaithe a shroicheann daonra na coilíneachta 3, chun adhmad a thiontú ina casúir. Tá casúir ag teastáil chun gach cineál foirgneamh a thógáil nó a uasghrádú.
model.building.cathedral.name=Ardeaglais
model.building.cathedral.description=Féadfaidh coilíneacht a bhfuil daonra de 3 nó níos mó aici eaglais a thógáil, agus is féidir í a uasghrádú go hardeaglais a luaithe a shroicheann an daonra 8. Is cúis le méadú ar imirce ón Eoraip an tsaoirse reiligiúnach sa Domhan Nua (a shiombailítear le crosa).\n\nTar éis ardeaglais a thógáil, méadaíonn táirgeadh crosa.
model.building.chapel.name=Teampall
model.building.chapel.description=Is áit í an séipéal do do choilínigh chun a reiligiún a chleachtadh. Déanann séipéal líon beag crosa leis féin, ach ní féidir aon seanmóirí a chur ag obair anseo. Beidh ort do shéipéal a uasghrádú go séipéal ar dtús.
model.building.church.name=Eaglais
model.building.church.description=Féadfaidh coilíneacht a bhfuil daonra de 3 nó níos mó aici eaglais a thógáil, agus is féidir í a uasghrádú go hardeaglais a luaithe a shroicheann an daonra 8. Is cúis le méadú ar an imirce ón Eoraip mar gheall ar shaoirse reiligiúnach an Domhain Nua (a shiombailítear le crosa).\n\nTar éis eaglais a thógáil, méadaíonn táirgeadh crosa agus ceadaítear duit misinéirí a choimisiúnú.
model.building.cigarFactory.name=Monarcha todóg
model.building.cigarFactory.description=Úsáidtear an mhonarcha todóg, nach féidir a uasghrádú, chun todóga a tháirgeadh as tobac. Méadaíonn monarcha todóg táirgeadh na dtodóg.
model.building.college.name=Coláiste
model.building.college.description=Féadfaidh coilíneacht a bhfuil daonra de 4 duine ar a laghad aici scoil a thógáil, rud a chuireann ar chumas ceardaí máistir éigin a gceird a mhúineadh do choilíneach neamhoilte. Chomh luath agus a shroicheann an daonra 8, is féidir é a uasghrádú go coláiste, ina bhféadfaidh beirt choilíneach ceirdeanna breise a mhúineadh. Chomh luath agus a shroicheann an daonra 10, is féidir ollscoil a chur in ionad an choláiste, ina bhféadfaidh triúr coilíneach gach ceird a mhúineadh.\n\nCeadaíonn coláiste dámh scileanna teagaisc 2.
model.building.country.name=Féarach
model.building.country.description=Is áit in aice le do choilíneacht í an féarach, áit a mbíonn do chapaill ag fánaíocht go saor. Méadóidh tógáil stáblaí táirgeadh capall.
model.building.customHouse.name=Teach custaim
model.building.customHouse.description=Ceadaíonn an teach custaim, ar féidir é a thógáil a luaithe a théann Peter Stuyvesant isteach sa Chomhdháil Ilchríochach, don choilíneacht earraí a onnmhairiú go díreach go dtí an Eoraip gan chabhair ó longa. Chomh maith leis sin, ceadaíonn sé trádáil le cumhachtaí eachtracha tar éis dearbhú na neamhspleáchais. De rogha air sin, féadfaidh sé neamhaird a dhéanamh ar bhaghcat freisin.
model.building.depot.name=Iosta
model.building.depot.description=Stórálann an stóras gach saghas earraí. Is é 100 aonad de gach cineál earraí a acmhainn tosaigh, ach is féidir é a uasghrádú go stóras, a bhfuil 200 ann. Méadaíonn tógáil leathnú breise ar an stóras an acmhainn stórála go 300.
model.building.distillerHouse.name=Teach an driogaire
model.building.distillerHouse.description=Úsáidtear teach an driogaire, ar féidir a uasghrádú go drioglann rum, chun rum a tháirgeadh as siúcra. Tar éis d'Adam Smith dul isteach i gComhdháil na Mór-roinne agus daonra de 8 ar a laghad a bheith sa choilíneacht, is féidir monarcha rum a chur in áit na drioglainne rum.
model.building.docks.name=Duganna
model.building.docks.description=Ligeann an duga do choilínigh iasc a tháirgeadh ar thíleanna aigéin in aice leis an gcoilíneacht. Chomh luath agus a bhíonn an daonra 4 ar a laghad, is féidir é a uasghrádú go duga tirim, rud a ligeann don choilíneacht longa damáistithe a dheisiú. Nuair a shroicheann daonra na coilíneachta 8, is féidir é a uasghrádú tuilleadh go longchlós, rud a ligeann don choilíneacht longa nua a thógáil.\n\nCeadaíonn tógáil duga iascaireacht.
model.building.drydock.name=Duga tirim
model.building.drydock.description=Ligeann an duga tirim do choilínigh iasc a tháirgeadh ar thíleanna aigéin in aice leis an gcoilíneacht, agus tugann sé deis longa a dheisiú. Nuair a shroicheann daonra na coilíneachta 8, is féidir í a uasghrádú tuilleadh go dtí longchlós, rud a chuireann ar chumas na coilíneachta longa nua a thógáil.\n\nCeadaíonn tógáil duga tirim deisiú long.
model.building.fort.name=Dún
model.building.fort.description=Ní féidir an dún, nach féidir a thógáil ach amháin tar éis stocáid a thógáil, a chosaint ar na coilínigh ó ionsaithe. Soláthraíonn an dún cosaint agus déanann sé buamáil ar phríobháidigh agus ar aonaid chabhlaigh namhaid ar thíleanna aigéin in aice láimhe. Is féidir an dún a athsholáthar le dún a luaithe a shroicheann an daonra 8.\n\nMéadaíonn tógáil dúin an chosaint 150%.
model.building.fortress.name=Daingean
model.building.fortress.description=Is féidir an dúnfort, ar féidir é a thógáil tar éis dúnfort a thógáil agus nuair a shroicheann an daonra 8, a chosaint ar na coilínigh ó ionsaithe. Soláthraíonn an dúnfort cosaint agus déanann sé buamáil ar phríobháidigh agus ar aonaid chabhlaigh namhaid ar thíleanna aigéin in aice láimhe.\n\nMéadaíonn tógáil dúnfort an chosaint 200%.
model.building.furFactory.name=Monarcha éadaí fionnaidh
model.building.furFactory.description=Úsáidtear an mhonarcha cótaí fionnaidh, nach féidir a uasghrádú, chun cótaí a tháirgeadh as éadaí fionnaidh. Méadaíonn monarcha todóg táirgeadh na dtodóg.
model.building.furTraderHouse.name=Teach trádálaí fionnaidh
model.building.furTraderHouse.description=Úsáidtear teach an trádálaí fionnaidh, ar féidir é a uasghrádú go post trádálaí fionnaidh, chun cótaí a tháirgeadh as fionnaidh. Nuair a shroicheann daonra na coilíneachta 6, is féidir é a uasghrádú tuilleadh go monarcha fionnaidh, ar choinníoll go bhfuil Adam Smith tar éis dul isteach sa Chomhdháil Ilchríochach.
model.building.furTradingPost.name=Post trádála fionnaidh
model.building.furTradingPost.description=Úsáidtear post an trádálaí fionnaidh, ar féidir é a uasghrádú go monarcha fionnaidh, chun cótaí a tháirgeadh as fionnaidh. Nuair a shroicheann daonra na coilíneachta 6, is féidir é a uasghrádú tuilleadh go monarcha fionnaidh, ar choinníoll go bhfuil Adam Smith tar éis dul isteach sa Chomhdháil Ilchríochach. Méadaíonn post trádálaí fionnaidh táirgeadh cótaí.
model.building.ironWorks.name=Ceardlann iarainn
model.building.ironWorks.description=Úsáidtear na hoibreacha iarainn, nach féidir a uasghrádú, chun mianach a thiontú ina n-uirlisí. Tá uirlisí ag teastáil chun cineálacha áirithe foirgneamh a thógáil agus chun gach cineál foirgneamh a uasghrádú. Úsáideann ceannródaithe uirlisí freisin agus chun muscaeidí a tháirgeadh. Méadaíonn oibreacha iarainn táirgeadh uirlisí.
model.building.lumberMill.name=Muileann adhmaid
model.building.lumberMill.description=Úsáidtear an muileann adhmaid, nach féidir a uasghrádú, chun adhmad a thiontú ina casúir. Tá casúir ag teastáil chun gach cineál foirgneamh a thógáil nó a uasghrádú. Méadaíonn muileann adhmaid táirgeadh casúir.
model.building.magazine.name=Irisleabhar
model.building.magazine.description=Úsáidtear an iris chun muscaeidí a tháirgeadh as uirlisí. Is féidir an iris a uasghrádú go harsenal, ar choinníoll go bhfuil Adam Smith tar éis dul isteach sa Chomhdháil Ilchríochach.\n\nTar éis iris a thógáil, méadaíonn táirgeadh muscaeidí 100%.
model.building.newspaper.name=Nuachtán
model.building.newspaper.description=Ní féidir an nuachtán a thógáil ach amháin tar éis meaisín clódóireachta a thógáil agus a luaithe a shroicheann an daonra 4, méadaíonn sé táirgeadh clog na saoirse.
model.building.printingPress.name=Clóphreas
model.building.printingPress.description=Méadaíonn an meaisín clódóireachta, ar féidir é a uasghrádú go nuachtán a luaithe a shroicheann an daonra 4, táirgeadh cloig saoirse na coilíneachta.
model.building.rumDistillery.name=Drioglann rum
model.building.rumDistillery.description=Úsáidtear an drioglann rum, ar féidir í a uasghrádú go monarcha rum, chun rum a tháirgeadh ó shiúcra. Nuair a bheidh Adam Smith tar éis dul isteach sa Chomhdháil Ilchríochach agus go mbeidh daonra 8 ar a laghad sa choilíneacht, is féidir monarcha rum a chur in ionad na drioglainne rum. Méadaíonn drioglann rum táirgeadh rum.
model.building.rumFactory.name=Monarcha rum
model.building.rumFactory.description=Úsáidtear an mhonarcha rum, nach féidir a uasghrádú, chun rum as éadaí siúcra. Méadaíonn monarcha rum an táirgeadh rum.
model.building.schoolhouse.name=Scoil
model.building.schoolhouse.description=Féadfaidh coilíneacht a bhfuil daonra de 4 duine ar a laghad aici teach scoile a thógáil, rud a chuireann ar chumas ceardaí máistir éigin a gceird a mhúineadh do choilíneach neamhoilte. Chomh luath agus a shroicheann an daonra 8, is féidir é a uasghrádú go coláiste, ina bhféadfaidh beirt choilíneach ceirdeanna breise a mhúineadh. Chomh luath agus a shroicheann an daonra 10, is féidir ollscoil a chur in ionad an choláiste, ina bhféadfaidh triúr coilíneach gach ceird a mhúineadh.\n\nCeadaíonn teach scoile scileanna teagaisc 1.
model.building.shipyard.name=Longcheárta
model.building.shipyard.description=Ligeann an longchlós do choilínigh iasc a tháirgeadh ar thíleanna aigéin in aice leis an gcoilíneacht, ceadaíonn sé deisiú long, agus ceadaíonn sé tógáil long.\n\nCeadaíonn tógáil longchlóis tógáil long.
model.building.stables.name=Stáblaí
model.building.stables.description=Méadaíonn na stáblaí an táirgeadh uasta capall trí mhéid na dtréada a laghdú.
model.building.stockade.name=Sonnach
model.building.stockade.description=Cosnaíonn an sonnach, ar féidir é a thógáil a luaithe agus a bheidh daonra de 3 ag an gcoilíneacht, na coilínigh ar ionsaithe. Is féidir an sonnach a uasghrádú go dún, a thugann cosaint níos fearr fós agus a dhéanann bombardaíocht ar shoithí foghla agus ar fhórsaí farraige na naimhde ar thíleanna aigéin in aice láimhe. Is féidir daingean a chur in ionad an dúin nuair a bheidh daonra de 8 ann.
model.building.textileMill.name=Muileann fíodóireachta
model.building.textileMill.description=Úsáidtear an muileann teicstíle, nach féidir a uasghrádú, chun cadás a thiontú ina éadach. Méadaíonn muileann teicstíle táirgeadh éadaigh.
model.building.tobacconistHouse.name=Teach an tobacadóra
model.building.tobacconistHouse.description=Úsáidtear teach an tobacóra, ar féidir é a uasghrádú go siopa tobac, chun todóga a tháirgeadh as tobac. Nuair a shroicheann daonra na coilíneachta 8, is féidir é a uasghrádú tuilleadh go monarcha todóg, ar choinníoll go bhfuil Adam Smith tar éis dul isteach sa Chomhdháil Ilchríochach.
model.building.tobacconistShop.name=Siopa an tobacadóra
model.building.tobacconistShop.description=Úsáidtear siopa an tobacóra, ar féidir é a uasghrádú go monarcha todóg, chun todóga a tháirgeadh as tobac. Nuair a shroicheann daonra na coilíneachta 8, is féidir é a uasghrádú tuilleadh go monarcha todóg, ar choinníoll go bhfuil Adam Smith tar éis dul isteach sa Chomhdháil Ilchríochach. Méadaíonn siopa tobac táirgeadh todóg.
model.building.townHall.name=Áras an Bhaile
model.building.townHall.description=Cuireann Halla an Bhaile, nach féidir a uasghrádú, áiteanna oibre ar fáil do suas le triúr coilíneoirí atá ag déanamh cloig saoirse. Is féidir a éifeacht a mhéadú trí phreas clódóireachta agus nuachtán a thógáil.
model.building.university.name=Ollscoil
model.building.university.description=Féadfaidh coilíneacht a bhfuil daonra de 4 duine ar a laghad aici scoil a thógáil, rud a chuireann ar chumas ceardaí máistir éigin a gceird a mhúineadh do choilíneach neamhoilte. Chomh luath agus a shroicheann an daonra 8, is féidir é a uasghrádú go coláiste, ina bhféadfaidh beirt choilíneach ceirdeanna breise a mhúineadh. Chomh luath agus a shroicheann an daonra 10, is féidir ollscoil a chur in ionad an choláiste, ina bhféadfaidh triúr coilíneach gach ceird a mhúineadh.\n\nCeadaíonn ollscoil dámh scileanna teagaisc 3.
model.building.warehouse.name=Stór
model.building.warehouse.description=Stórálann an stóras gach saghas earraí. Is é seo an chéad uasghrádú ar stóras, le hacmhainn 200 aonad do gach cineál earraí. Méadaíonn leathnú stórais an acmhainn stórála go 300.
model.building.warehouseExpansion.name=Leathnú stórais
model.building.warehouseExpansion.description=Stórálann an stóras leathnaithe gach saghas earraí. Is uasghrádú é ar an stóras simplí, le hacmhainn 300 aonad do gach cineál earraí.
model.building.weaverHouse.name=Teach an fhíodóra
model.building.weaverHouse.description=Úsáidtear teach an fhíodóra, ar féidir é a uasghrádú go siopa fíodóra, chun cadás a thiontú ina éadach. Is féidir é a uasghrádú go muileann teicstíle a luaithe a bheidh daonra na coilíneachta 8 ar a laghad agus a bheidh Adam Smith tar éis dul isteach sa Chomhdháil Ilchríochach.
model.building.weaverShop.name=Siopa an fhíodóra
model.building.weaverShop.description=Úsáidtear siopa an fhíodóra, ar féidir é a uasghrádú go muileann teicstíle, chun cadás a thiontú ina éadach. Is féidir é a uasghrádú go muileann teicstíle a luaithe a bheidh daonra na coilíneachta 8 ar a laghad agus a bheidh Adam Smith tar éis dul isteach sa Chomhdháil Ilchríochach. Méadaíonn siopa fíodóra táirgeadh éadaigh.
