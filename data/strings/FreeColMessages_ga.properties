model.foundingFather.adamSmith.description=Cumasaíonn sé tógáil monarchana.
model.foundingFather.adamSmith.text=Ar a dtugtar Athair na hEacnamaíochta Nua-Aimseartha níos fearr, scríobh Smith roinnt téacsanna a bhain le teoiric na heacnamaíochta, lena n-áirítear The Wealth of Nations, an téacs is cáiliúla aige.
model.foundingFather.jacobFugger.description=Tá deireadh curtha le gach baghcat atá i bhfeidhm faoi láthair.
model.foundingFather.jacobFugger.text=Ceannaí agus baincéir Gearmánach thar a bheith saibhir. Bhailigh sé fhortún le comhpháirtíochtaí teaghlaigh agus le sealúchais stoic sna tionscail mianadóireachta.
model.foundingFather.peterMinuit.description=Ní éilíonn Indiaigh íocaíocht as a gcuid talún a thuilleadh.
model.foundingFather.peterMinuit.text=Cheannaigh sé an áit ar a dtugtaí Oileán Manhattan níos déanaí ó Mheiriceánaigh Dhúchasacha ar thart ar 60 guilder Ollainnis. Ina dhiaidh sin, dhéanfadh sé coilíniú ar cheantar Bhá Delaware chomh maith.
model.foundingFather.peterStuyvesant.description=Bíonn sé indéanta tithe saincheaptha a thógáil.
model.foundingFather.peterStuyvesant.text=Ceapadh é ina Ghobharnóir Ginearálta ar an Ísiltír Nua, áit ar tháinig Nua-Eabhrac chun bheith ina stát tar éis ionradh na Breataine nárbh fhéidir leis a stopadh.
model.foundingFather.janDeWitt.description=Bíonn trádáil le coilíneachtaí eachtracha indéanta agus taispeántar tuilleadh eolais faoi iomaitheoirí coilíneacha.
model.foundingFather.janDeWitt.text=Fear mór státseirbhíse Ollannach ab ea De Witt. Rinne sé ionadaíocht ar na ceannaithe agus spreag sé tionscal agus tráchtáil. Rinne sé idirbheartaíocht freisin ar roinnt conarthaí tábhachtacha do na hOllainnigh chun deireadh a chur le cogaí le Sasana.
model.foundingFather.ferdinandMagellan.description=Méadaítear gluaiseacht soithí cabhlaigh faoi 1 agus giorraítear an t-am a thógann sé seoltóireacht go dtí/ón Eoraip/Meiriceá.
model.foundingFather.ferdinandMagellan.text=Duine de na taiscéalaithe ba mhó a loingseoireacht an domhain. Ba é Magellan an chéad duine a chuaigh timpeall an domhain agus a thrasnaigh an tAigéan Ciúin.
model.foundingFather.franciscoDeCoronado.description=Bíonn na coilíneachtaí uile atá ann le feiceáil ar an léarscáil.
model.foundingFather.franciscoDeCoronado.text=An chéad taiscéalaí Eorpach a chonaic an Grand Canyon. Cé nár aimsigh sé na cathracha órga a bhí á lorg aige riamh, bhí a mhapáil den cheantar ar a dtugtar Iardheisceart na Stát Aontaithe anois tábhachtach chun tuilleadh taiscéalaíochta a dhéanamh.
model.foundingFather.hernandoDeSoto.description=Ní bhíonn toradh diúltach riamh ar iniúchadh Ráflaí na Cathrach Caillte agus bíonn ga radhairc leathnaithe ag gach aonad talún.
model.foundingFather.hernandoDeSoto.text=An chéad Eorpach a rinne iniúchadh ar Florida agus ar oirdheisceart SAM. Bhí ról suntasach aige freisin i ngabhálacha Mheiriceá Láir.
model.foundingFather.henryHudson.description=Méadaíonn sé aschur gach gaisteora fionnaidh faoi 100%.
model.foundingFather.henryHudson.text=Loingseoir Sasanach a rinne iniúchadh agus mapáil ar limistéar mór de mhór-roinn thoir thuaidh Mheiriceá Thuaidh. Tá go leor uiscebhealaí sa réigiún sin ainmnithe ina onóir. Ba é a sprioc bhunaidh an Pasáiste Iarthuaisceart cáiliúil a aimsiú.
model.foundingFather.laSalle.description=Tugann sé stocáid do gach coilíneacht atá ann cheana féin agus a bheidh ann amach anseo nuair a shroicheann a ndaonra 3.
model.foundingFather.laSalle.text=Ba é de La Salle an chéad Eorpach a thaistil fad abhainn Mississippi, agus bhí sé ar mhisean chun go leor post trádála a bhunú feadh a bruacha. Ina dhiaidh sin, d'éiligh sé an imchuach ar fad mar Louisiana in onóir Rí na Fraince. Ina dhiaidh sin, rinne sé iniúchadh ar roinnt de na Lochanna Móra.
model.foundingFather.hernanCortes.description=Bíonn seoda (agus i líon mór níos mó) i gcónaí ar lonnaíochtaí dúchasacha faoi chonstaic agus iompraíonn galúnaigh an mhonarc iad saor in aisce.
model.foundingFather.hernanCortes.text=Conquistadóir cáiliúil Spáinneach a chuir deireadh le Impireacht na nAstec agus a d'éiligh Meicsiceo don Spáinn.
model.foundingFather.georgeWashington.description=Déantar aon saighdiúir nó dragan a bhuaigh cath a uasghrádú go huathoibríoch go dtí an chéad leibhéal eile is féidir.
model.foundingFather.georgeWashington.text=Threoraigh an Ginearál Washington arm na gcoilíneachtaí chun bua a fháil ar na Breataine chun neamhspleáchas a bhaint amach do na coilíneachtaí. Mar thoradh ar an mbua seo agus ar a cheannaireacht ainmníodh é mar chéad Uachtarán an náisiúin nua.
model.foundingFather.paulRevere.description=Nuair a dhéantar ionsaí ar choilíneacht nach bhfuil aon saighdiúirí ina seasamh inti, tógann coilíneach go huathoibríoch aon muscaeid atá carntha agus déanann sé cosaint uirthi.
model.foundingFather.paulRevere.text=Chuaigh marcach cáiliúil choilíneach Mheiriceá ar a chapall agus chuaigh sé ar thóir a each tríd an tuath ag tabhairt foláireamh do na coilínigh go raibh saighdiúirí Briotanacha ag teacht. Gabhadh é le linn an turais agus scaoileadh saor é ina dhiaidh sin nuair a chreid a ghabhdóirí go raibh siad i mbaol mór agus go bhféadfadh a bpríosúnach moill a chur orthu.
model.foundingFather.francisDrake.description=Méadaíonn sé neart comhraic na bPríobháideach go léir faoi 50%.
model.foundingFather.francisDrake.text=Captaen mara Sasanach mór le rá ab ea Drake, an chéad Sasanach a chuaigh timpeall an domhain agus laoch sna troideanna in aghaidh Armada na Spáinne.
model.foundingFather.johnPaulJones.description=Cuirtear frigéad le do chabhlach coilíneach (saor in aisce).
model.foundingFather.johnPaulJones.text=Moladh gur captaen mara den scoth a bhí ann i Meiriceá, agus dúirt Jones na focail cháiliúla ‘A dhuine uasail, níl mé tosaithe ag troid fós’ agus é ag troid leis na Breataine ar muir. Ina dhiaidh sin, chonaic sé a long ag dul go bun an aigéin ó dheic loinge Briotanaigh.
model.foundingFather.thomasJefferson.description=Méadaíonn sé táirgeadh Liberty Bell i gcoilíneachtaí faoi 50%.
model.foundingFather.thomasJefferson.text=Guth cumhachtach don tírghrá, tugadh creidiúint do Jefferson as Dearbhú na Saoirse a scríobh. Ina dhiaidh sin, ba é an 3ú Uachtarán ar Stáit Aontaithe Mheiriceá é.
model.foundingFather.pocahontas.description=Baintear gach leibhéal teannais idir tú féin agus na bundúchasaigh agus gintear aláram Indiach leath chomh tapa.
model.foundingFather.pocahontas.text=Síochánaí idir lonnaitheoirí luatha Jamestown agus na Meiriceánaigh Dhúchasacha. Tugtar creidiúint di as bia agus soláthairtí eile a sheoladh chuig coilínigh ocracha ansin le linn amanna crua. Thiontaigh sí chun na Críostaíochta ina dhiaidh sin agus phós sí fear Sasanach.
model.foundingFather.thomasPaine.description=Méadaíonn sé táirgeadh Liberty Bell i gcoilíneachtaí de réir luach an ráta cánach reatha.
model.foundingFather.thomasPaine.text=Spreag sé coilínigh lena pheann ar áiteamh Benjamin Franklin. D’fhoilsigh sé paimfléad, Common Sense, ag treorú smaointe na bpátrún ar fud na gcoilíneachtaí.
model.foundingFather.simonBolivar.description=Méadaítear ballraíocht Sons of Liberty i ngach coilíneacht atá ann cheana féin faoi 20%.
model.foundingFather.simonBolivar.text=Cuimhnítear air mar cheannaire mór sa streachailt ar son neamhspleáchas Mheiriceá Theas ón Spáinn. Shaor Bolivar Veiniséala anois agus ina dhiaidh sin ba é a chéad Uachtarán é.
model.foundingFather.benjaminFranklin.description=Ní bhíonn tionchar a thuilleadh ag cogaí eachtracha na Corónach ar chaidrimh sa Domhan Nua agus bíonn Eorpaigh sa Domhan Nua i gcónaí ag tairiscint síochána i gcaibidlíochtaí.
model.foundingFather.benjaminFranklin.text=Bhí Franklin ina rannpháirtí mór i nDearbhú na Saoirse, agus ba é duine de ghlórtha na Réabhlóide é. Thaistil sé go forleathan idir an Eoraip agus na coilíneachtaí, agus fuair sé tacaíocht na bhFrancach sa chogadh.
model.foundingFather.williamBrewster.description=Ní bheidh a thuilleadh coirpigh ná seirbhísigh le feiceáil ar na dugaí, agus is féidir leat a roghnú cé acu inimirceach sa linn earcaíochta le bogadh chuig na dugaí.
model.foundingFather.williamBrewster.text=Ba é Brewster ceannaire na bPiúratánach i gcoilíneacht Plymouth i Sasana Nua.
model.foundingFather.williamPenn.description=Méadaítear tras-tháirgeadh i ngach coilíneacht faoi 50%.
model.foundingFather.williamPenn.text=Mar chara dlúth le Diúc Eabhrac, bronnadh an talamh ar Penn, arb ionann é den chuid is mó de Pennsylvania, Delaware, agus New Jersey. Bhí sé i gceannas ar choilíneacht na gCairéacar ar feadh roinnt blianta chun tearmann a sholáthar do chomh-Chairéacaraigh.
model.foundingFather.fatherJeanDeBrebeuf.description=Feidhmíonn na misinéirí uile mar shaineolaithe.
model.foundingFather.fatherJeanDeBrebeuf.text=Rinne sé cairdeas leis na hIndiaigh Huron agus thiontaigh sé go leor acu chun na Críostaíochta. Fuair ​​sé bás i lámha na nIroquois a raibh a namhaid, na Hurons, buailte acu sa deireadh.
model.foundingFather.juanDeSepulveda.description=Méadaíonn sé seo an seans go "tiontóidh" daonra lonnaíochta Indiach atá faoi chois agus go dtiocfaidh siad isteach i do choilíneachtaí faoi 20%.
model.foundingFather.juanDeSepulveda.text=Diagaire Spáinneach a labhair amach ar son choncas tailte na nIndiach agus soiscéalú éigeantach na ndúchasach.
model.foundingFather.bartolomeDeLasCasas.description=Déantar gach tiontaithe Indiach atá ann cheana a thiontú ina choilínigh shaora.
model.foundingFather.bartolomeDeLasCasas.text=Sagart Caitliceach a thaistil na hIndiacha ag tiontú Indiaigh agus ag cáineadh na Spáinne as an gcaoi a ndearna siad na Dúchasaigh a chóireáil.
