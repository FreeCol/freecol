model.resource.minerals.name=Mianraí
model.resource.minerals.description=Tá an talamh saibhir i mianraí, agus dóibh siúd atá foighneach, is féidir mianach nó fiú airgead a fháil.
model.resource.oasis.name=Ósais
model.resource.oasis.description=Is radharc fáilteach é an t-ósais sa fhásach do gach taistealaí tuirseach.
