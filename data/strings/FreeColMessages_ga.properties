model.tile.arctic.name=Artach
model.tile.arctic.description=Is aigéan fairsing clúdaithe le hoighear é an Artach den chuid is mó, timpeallaithe ag talamh reoite gan chrainn agus nach dtáirgeann tada. Faightear iad in aice leis an Mol Thuaidh agus an Mol Theas agus ní bhíonn coilíneachtaí acu de ghnáth.
model.tile.borealForest.name=Foraois bhóireach
model.tile.borealForest.description=Táirgeann foraoisí boreal gráin, adhmad, fionnadh, agus roinnt méine. Faightear iad gar do na réigiúin pholacha agus is féidir iad a ghlanadh chun tundra a tháirgeadh.
model.tile.broadleafForest.name=Foraois leathanduilleach
model.tile.broadleafForest.description=Táirgeann foraoisí leathanduilleacha gráin, adhmad, fionnadh, agus roinnt cadáis. Faightear iad sna domhanleithid mheasartha agus tugann siad bealach do mhóinteáin nuair a ghlantar iad.
model.tile.coniferForest.name=Foraois bhuaircíneach
model.tile.coniferForest.description=Táirgeann foraoisí cónféaracha gráin, adhmad, fionnadh, agus roinnt tobac. Faightear iad den chuid is mó sna domhanleithid trópaiceacha agus tugann siad bealach do fhéarach nuair a ghlantar iad.
model.tile.desert.name=Fásach
model.tile.desert.description=Bíonn fásaigh an-tirim, ní bhíonn mórán deascadh iontu. Cé go bhfuil siad gann, táirgeann fásaigh gráin, cadás agus méine.
model.tile.grassland.name=Féarach
model.tile.grassland.description=Is limistéir oscailte, leanúnacha cothroma féir iad féarthailte. Is minic a bhíonn siad suite in aice le foraoisí measartha i gceantair arda nó fásaigh i gceantair fothrópaiceacha. Tá féarthailte oiriúnach chun tobac a fhás. Is féidir bia a fhás ann chomh maith.
model.tile.greatRiver.name=Abhainn mhór
model.tile.greatRiver.description=Is aibhneacha iad aibhneacha móra ar féidir le longa nascleanúint a dhéanamh orthu.
model.tile.highSeas.name=Farraigí arda
model.tile.highSeas.description=Tugann muir mhóra iasc. Cuireann siad ar chumas do longa seoltóireacht a dhéanamh go dtí an Eoraip agus ar ais uaithi freisin.
model.tile.hills.name=Cnoic
model.tile.hills.description=Síneann cnoic amach os cionn an tír-raoin máguaird, i limistéar teoranta. Táirgeann cnoic cuid mhór méine, chomh maith le roinnt gráin.
model.tile.lake.name=Loch
model.tile.lake.description=Is comhlachtaí uisce intíre iad lochanna. Baineann coilíneachtaí atá tógtha in aice láimhe leas as acmhainní nádúrtha na lochanna, ach d'fhéadfadh sé nach mbeadh rochtain orthu ar long.
model.tile.marsh.name=Riasc
model.tile.marsh.description=Is cineál talún fliuch é an riasc, ina bhfuil féar, luachair, giolcach, tíofaí, cíbeanna agus plandaí luibheacha eile i gcomhthéacs uisce éadomhain. Táirgeann an riasc roinnt gráin agus tobac, chomh maith le méine. Faightear riasca den chuid is mó in aice leis na réigiúin pholacha.
model.tile.mixedForest.name=Foraois mheasctha
model.tile.mixedForest.description=Foraoisí measctha, atá le fáil sna domhanleithid mheasartha, a tháirgeann grán, adhmad, fionnadh, agus roinnt cadáis. Má ghlantar foraoisí measctha, bíonn siad ina machairí.
model.tile.mountains.name=Sléibhte
model.tile.mountains.description=Síneann sléibhte amach os cionn an tír-raoin máguaird i limistéar teoranta. De ghnáth bíonn sléibhte níos géire ná cnoic. Tá sé deacair taisteal iontu agus ní féidir coilíneachtaí a bhunú anseo. Soláthraíonn siad bónas ard cosanta ach ní mhéadaíonn daingniú é seo. Cruthaíonn mianadóireacht úsáideach le haghaidh eastóscadh méine agus airgid.
model.tile.ocean.name=Aigéan
model.tile.ocean.description=Is príomhchodanna uisce saillte iad na haigéin, atá go maith le haghaidh iascaireachta. Méadaíonn láithreacht talún agus go háirithe béal abhann líon na n-iasc.
model.tile.plains.name=Machairí
model.tile.plains.description=Is limistéir mhóra talún iad machairí a bhfuil faoiseamh réasúnta íseal acu, atá níos oiriúnaí le haghaidh feirmeoireachta. Táirgeann siad cuid mhór gráin, méid níos lú cadáis, agus roinnt méine. Faightear iad sna réigiúin mheasartha.
model.tile.prairie.name=Féarthalamh
model.tile.prairie.description=Is limistéar talún é machaire ina bhfásann féar agus luibheanna, le cúpla crann, agus a bhfuil aeráid mheasartha nó mheasartha ann de ghnáth. Is iad machairí is oiriúnaí chun grán agus cadás a shaothrú.
model.tile.rainForest.name=Foraois bháistí
model.tile.rainForest.description=Táirgeann foraoisí báistí grán, adhmad, fionnadh, agus roinnt méine agus siúcra. Faightear iad sna trópaicí agus is féidir iad a ghlanadh chun portaigh a chruthú.
model.tile.savannah.name=Sabhána
model.tile.savannah.description=I sabhánaí, is iad féara agus crainn na cineálacha fásra comhcheannasacha. Is minic a fheictear sabhánaí mar chrios idirthréimhseach, a tharlaíonn idir réigiúin foraoise nó coillte agus réigiúin féarthailte nó fásaigh. Táirgeann sabhánaí Gráin agus Siúcra den chuid is mó.
model.tile.scrubForest.name=Foraois scrobarnaí
model.tile.scrubForest.description=Táirgeann foraoisí scrobarnacha gráin, adhmad, fionnadh, agus roinnt cadáis agus méine. Má ghlantar iad, bíonn an talamh ina fhásach. Faightear foraoisí scrobarnacha i réigiúin mheasartha.
model.tile.swamp.name=Seascann
model.tile.swamp.description=Tailte fliucha trópaiceacha le hais uisce éadoimhne. Bíonn cion níos mó de dhromchla uisce oscailte ag portaigh agus bíonn siad níos doimhne ná mar a bhíonn ag portaigh i gcoitinne. Tugann portaigh roinnt gráin, chomh maith le méideanna beaga siúcra agus méine.
model.tile.tropicalForest.name=Foraois thrópaiceach
model.tile.tropicalForest.description=Táirgeann foraoisí trópaiceacha gráin, adhmad, fionnadh, agus roinnt siúcra. Nuair a imíonn foraoisí trópaiceacha, cruthaítear sabhána.
model.tile.tundra.name=Tundra
model.tile.tundra.description=Is limistéar é an tundra ina gcuireann teochtaí ísle agus séasúir ghearra fáis bac ar fhás na gcrann. Táirgeann an tundra gráin agus roinnt méine. Faightear é gar do na réigiúin pholacha.
model.tile.wetlandForest.name=Foraois bhogaigh
model.tile.wetlandForest.description=Táirgeann foraoisí bogaigh grán, adhmad, fionnadh, agus roinnt méine. Is féidir foraoisí bogaigh a ghlanadh chun talamh portaigh a tháirgeadh. Faightear iad gar do na réigiúin pholacha.
colonist.name=Coilíneoir teibí
colonist.description=Aonad coilínigh bonn
ship.name=Long teibí
ship.description=Aonad bonn loinge
wagon.name=Vaigín teibí
wagon.description=Aonad vaigín bonn
model.unit.colonialRegular.name={{plural:%number%|one=Rialtach Coilíneach|other=Rialtaigh Choilíneacha|default=Rialtach Choilíneach}}
model.unit.colonialRegular.description=Is scothaonad é an Rialtach Coilíneach nach mbíonn ar fáil ach tar éis Forógra na Saoirse.
model.unit.elderStatesman.description=Méadaíonn an Státaire Ealaí mian na gcoilínigh le haghaidh neamhspleáchais (siombailithe ag Cloig na Saoirse), rud a mhéadaíonn ballraíocht Mhic na Saoirse i do choilíneachtaí.
model.unit.expertFarmer.description=Is speisialtóir i dtáirgeadh bia é an Feirmeoir Saineolach.
model.unit.expertFisherman.description=Is speisialtóir é an tIascaire Saineolach ar iasc a ghabháil, a thiontaítear go bia go huathoibríoch.
model.unit.expertFurTrapper.description=Speisialtóireacht ag an Expert Fur Trapper i dtáirgeadh fionnaidh.
model.unit.expertLumberJack.description=Gearrann an Saineolaí Adhmaid crainn chun adhmad a tháirgeadh.
model.unit.expertOreMiner.description=Tá an Mianadóir Méine Saineolach ar fheabhas ag mianadóireacht méine.
model.unit.expertSilverMiner.description=Táirgeann an Mianadóir Airgid Saineolach níos mó airgid ná aon aonad eile.
model.unit.firebrandPreacher.description=Méadaíonn an Seanmóirí Tine corraíl reiligiúnach san Eoraip (siombailithe ag Crosa), rud a mhéadaíonn eisimirce chuig an Domhan Nua dá réir.
model.unit.freeColonist.description=Is duine nua é an Coilíneoir Saor gan aon scileanna ar leith. Mar sin féin, is féidir le Coilínigh Saora a bheith ina n-aonaid oilte trí oibriú ar do thíleanna coilíneachta, nó trí chuairt a thabhairt ar lonnaíochtaí Indiach. Is féidir iad a ardú céime freisin go Saighdiúirí Iar-Shaighdiúirí, nó oideachas a fháil i gcoilíneachtaí a thóg scoil.
model.unit.hardyPioneer.description=Tá an Hardy Pioneer thar barr ag glanadh foraoisí, ag treabhadh páirceanna agus ag tógáil bóithre.
model.unit.indenturedServant.description=Tá an Seirbhíseach Conartha oiriúnach go maith d’obair lasmuigh, ach níos lú oiriúnach d’obair laistigh. Féadfaidh sé a bheith ina Choilíneoir Saor trí ardú céime nó oideachas.
model.unit.indianConvert.description=Is é an Tiontaitheoir Indiach duine dúchasach atá tar éis dul isteach i gceann de do choilíneachtaí. Tá sé oilte i ngach cineál oibre lasmuigh, ach níl sé oilte i obair laistigh. A luaithe a théann Bartolome de las Casas isteach sa Chomhdháil Ilchríochach, bíonn gach Tiontaitheoir Indiach ina Choilínigh Shaor.
model.unit.jesuitMissionary.description=Tá an Misinéir Íosánach in ann misean a bhunú i lonnaíocht Indiach agus tá sé thar a bheith oilte ag tiontú Indiach.
model.unit.masterBlacksmith.description=Déanann an Máistir-Gabha uirlisí a bhruithniú as méine.
model.unit.masterCarpenter.description=Tá an Máistir-Shiúinéir thar a bheith oilte maidir le foirgnimh agus aonaid a tháirgeadh i do choilíneachtaí.
model.unit.masterCottonPlanter.description=Saothraíonn an Máistir-Phlandálaí Cadáis cadás.
model.unit.masterDistiller.description=Úsáideann an Máistir-Dhriogadóir siúcra chun rum a tháirgeadh.
model.unit.masterFurTrader.description=Déanann an Máistir-Thrádálaí Fionnaidh cótaí as fionnaidh.
model.unit.masterGunsmith.description=Úsáideann an Máistir-Ghunadóir uirlisí chun muscaeidí a tháirgeadh.
model.unit.masterSugarPlanter.description=Saothraíonn an Máistir-Phlandálaí Siúcra siúcra.
model.unit.masterTobaccoPlanter.description=Saothraíonn an Máistir-Phlandálaí Tobac tobac.
model.unit.masterTobacconist.description=Déanann an Máistir-Tobacadóir todóga as tobac.
model.unit.masterWeaver.description=Déanann an Máistir-Fhíodóir cadás ina éadach.
model.unit.pettyCriminal.description=Tá an Coirpeach Beag oiriúnach d'obair lasmuigh, ach níl sé oiriúnach d'obair laistigh. Féadfaidh sé a bheith ina Sheirbhíseach Conartha trí ardú céime nó oideachas.
model.unit.seasonedScout.description=Is fearr an Gasóg Séasúrach ag iniúchadh an Domhain Nua, go háirithe lonnaíochtaí Indiach agus Ráflaí Cathrach Caillte.
model.unit.veteranSoldier.description=Is aonad míleata taithíoch é an Saighdiúir Seanchónaithe. Féadfar ardú céime a thabhairt d’aon Choilíneach Saor go Saighdiúir Seanchónaithe tar éis cath a bhuachan.
model.unit.caravel.description=Is long cheannaíochta bheag agus níl sí thar a bheith gasta.
model.unit.frigate.description=Is long chogaidh bheag í an Frigéad.
model.unit.galleon.description=Is long mhór ceannaíochta í an Galleon. Is í an t-aon long atá in ann Traein Taisce a thabhairt go dtí an Eoraip.
model.unit.manOWar.description=Is long mhór í an Long Chogaidh. Ní bhíonn sí ar fáil ach don Choróin agus tar éis Fhorógra na Saoirse.
model.unit.merchantman.description=Is long cheannaíochta meánmhéide í an Merchantman.
model.unit.privateer.description=Is long chogaidh bheag í an Privateer nach bhfuil bratach na tíre as a dtagann sí ar foluain. Is í an t-aonad amháin atá in ann ionsaí a dhéanamh ar aonaid eile gan cogadh a fhógairt.
model.unit.artillery.description=Tá an airtléire go maith ag ionsaí agus ag cosaint coilíneachtaí, agus tá siad an-leochaileach san oscailt.
model.unit.damagedArtillery.description=Tá Airtléire Damáiste cosúil le hAirtléire ar gach slí, ach níos laige.
model.unit.treasureTrain.description=Is é cuspóir amháin an Traein Taisce ná an t-ór a fhaightear i bhfothracha Cathrach Caillte, nó a chreachadh ó lonnaíocht Indiach, a iompar. Má bhogann tú isteach i gceann de do choilíneachtaí é, tairgfidh an Choróin é a iompar go dtí an Eoraip ar tháille réasúnta. Má tá Galleon agat, is féidir leat é a bhogadh go dtí an Eoraip tú féin.
model.unit.wagonTrain.description=Tá an Traein Vaigíní in ann suas le 200 aonad earraí a iompar thar tír. Is féidir leat é a úsáid chun trádáil a dhéanamh le himreoirí eile, nó chun earraí a bhogadh idir do choilíneachtaí féin.
model.unit.kingsRegular.name={{plural:%number%|one=Rialtach an Rí|other=Rialtaigh an Rí|default=Rialtaigh an Rí}}
model.unit.kingsRegular.description=Is scothaonad é Rialtach an Rí nach bhfuil ar fáil ach don Choróin. Ní fheicfidh tú iad ach nuair a thiocfaidh an Fórsa Sluaíochta Ríoga tar éis Forógra na Saoirse.
model.unit.brave.description=Is aonad dúchasach é an Brave atá in ann méid beag earraí a iompar. Féadfaidh sé a bheith armtha agus ar chapall. Is minic a thugann Braves cuairt ar do choilíneachtaí chun bronntanais a thabhairt duit nó éilimh a dhéanamh.
model.unit.flyingDutchman.name=An Duitseach Eitilte
model.unit.flyingDutchman.description=Is í an Flying Dutchman long na ndaoine damnaithe.
model.unit.revenger.name=An Captaen
model.unit.revenger.description=Dhíol an Captaen a anam leis an Diabhal.
model.unit.undead.name=Neamh-mharbh
model.unit.undead.description=Is iad na Undead criú an Flying Dutchman.
