declareIndependence.resolution=Inniu, rith an Chomhdháil an Rún is tábhachtaí a glacadh riamh i Meiriceá.\n\nTá a fhios agam go maith faoin Saothar, an Fhuil agus an Ciste, go gcosnóidh sé orainn an Dearbhú seo a choinneáil, agus na Stáit seo a thacú agus a chosaint. Ach tríd an nGruaim go léir, is féidir liom gathanna an tSolais agus na Glóire iontacha a fheiceáil. Is féidir liom a fheiceáil go bhfuil an Deireadh níos mó ná fiú na hacmhainní go léir. Agus go mbeidh bua ag an tSliocht i mBeart an Lae sin, fiú má ba chóir dúinn aiféala a dhéanamh faoi, rud a bhfuil muinín agam as Dia nach ndéanaimid.\n\nBeidh Fórsa Taiscéalaíochta Ríoga linn go luath. Ullmhaígí ár gcosaintí go cúramach agus muid ag bailiú oibrithe deonacha d'Arm Ilchríochach nua.
